<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="gameTitle">贪吃蛇</h1>
            <div class="env-panel" aria-label="运行配置">
                <div class="meta-grid">
                    <div class="meta-item">
                        <div class="meta-label">环境</div>
                        <div class="meta-value" id="metaEnv">-</div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">网格大小</div>
                        <div class="meta-value"><span id="metaGridSize">-</span> × <span id="metaGridSize2">-</span></div>
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">初始速度</div>
                        <div class="meta-value"><span id="metaInitialSpeed">-</span> ms/tick</div>
                    </div>
                </div>
                <div class="secrets">
                    <div class="secrets-title">敏感变量（仅展示存在与长度）</div>
                    <table class="secrets-table">
                        <thead>
                            <tr>
                                <th>变量</th>
                                <th>存在</th>
                                <th>长度</th>
                                <th>校验</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>API_KEY</td>
                                <td id="secretApiKeyPresent">-</td>
                                <td id="secretApiKeyLength">-</td>
                                <td id="secretApiKeyOk">-</td>
                            </tr>
                            <tr>
                                <td>DB_PASSWORD</td>
                                <td id="secretDbPasswordPresent">-</td>
                                <td id="secretDbPasswordLength">-</td>
                                <td id="secretDbPasswordOk">-</td>
                            </tr>
                            <tr>
                                <td>ADMIN_TOKEN</td>
                                <td id="secretAdminTokenPresent">-</td>
                                <td id="secretAdminTokenLength">-</td>
                                <td id="secretAdminTokenOk">-</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">分数</span>
                    <span class="value" id="score">0</span>
                </div>
                <div class="score-item">
                    <span class="label">最高分</span>
                    <span class="value" id="highScore">0</span>
                </div>
            </div>
        </div>
        
        <div class="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div id="gameOver" class="game-over hidden">
                <h2>游戏结束!</h2>
                <p>最终分数: <span id="finalScore">0</span></p>
                <button id="restartBtn">重新开始</button>
            </div>
            <div id="startScreen" class="start-screen">
                <h2>准备好了吗?</h2>
                <p>使用方向键控制蛇的移动</p>
                <p>吃到食物增加分数和长度</p>
                <button id="startBtn">开始游戏</button>
            </div>
        </div>
        
        <div class="skin-selector">
            <h3>选择皮肤</h3>
            <div class="skin-options">
                <div class="skin-option active" data-skin="classic" title="经典绿">
                    <div class="skin-preview classic"></div>
                    <span>经典</span>
                </div>
                <div class="skin-option" data-skin="neon" title="霓虹紫">
                    <div class="skin-preview neon"></div>
                    <span>霓虹</span>
                </div>
                <div class="skin-option" data-skin="golden" title="土豪金">
                    <div class="skin-preview golden"></div>
                    <span>土豪金</span>
                </div>
                <div class="skin-option" data-skin="ocean" title="海洋蓝">
                    <div class="skin-preview ocean"></div>
                    <span>海洋</span>
                </div>
                <div class="skin-option" data-skin="fire" title="火焰红">
                    <div class="skin-preview fire"></div>
                    <span>火焰</span>
                </div>
                <div class="skin-option" data-skin="matrix" title="矩阵绿">
                    <div class="skin-preview matrix"></div>
                    <span>矩阵</span>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <p>使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制</p>
            <p>按 <kbd>空格</kbd> 暂停/继续</p>
        </div>
    </div>
    
    <script>
        window.__GAME_CONFIG__ = __CONFIG_JSON__;
        (function () {
            const config = window.__GAME_CONFIG__ || {};
            const title = typeof config.gameTitle === 'string' && config.gameTitle.length > 0 ? config.gameTitle : '贪吃蛇';
            document.title = title;
            const titleEl = document.getElementById('gameTitle');
            if (titleEl) titleEl.textContent = title;

            const envEl = document.getElementById('metaEnv');
            if (envEl) envEl.textContent = config.env ?? '-';
            const gridEl = document.getElementById('metaGridSize');
            const gridEl2 = document.getElementById('metaGridSize2');
            if (gridEl) gridEl.textContent = config.gridSize ?? '-';
            if (gridEl2) gridEl2.textContent = config.gridSize ?? '-';
            const speedEl = document.getElementById('metaInitialSpeed');
            if (speedEl) speedEl.textContent = config.initialSpeed ?? '-';

            const secrets = config.secrets || {};
            function setSecretRow(prefix, meta) {
                const presentEl = document.getElementById(prefix + 'Present');
                const lengthEl = document.getElementById(prefix + 'Length');
                const okEl = document.getElementById(prefix + 'Ok');
                const present = Boolean(meta && meta.present);
                const length = meta && typeof meta.length === 'number' ? meta.length : 0;
                const ok = Boolean(meta && meta.ok);
                if (presentEl) presentEl.textContent = present ? '是' : '否';
                if (lengthEl) lengthEl.textContent = String(length);
                if (okEl) okEl.textContent = ok ? '通过' : '不通过';
            }
            setSecretRow('secretApiKey', secrets.API_KEY);
            setSecretRow('secretDbPassword', secrets.DB_PASSWORD);
            setSecretRow('secretAdminToken', secrets.ADMIN_TOKEN);
        })();
    </script>
    <script src="game.js"></script>
</body>
</html>
